<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Drone Map — DroneRescue AI</title>
    <meta name="description" content="Real-time drone tracking map showing active incidents and drone movements.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2235;
            --bg-glass: rgba(26, 34, 53, 0.85);
            --accent-blue: #3b82f6;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-red: #ef4444;
            --accent-amber: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.05em;
        }

        .topbar-brand span {
            font-size: 1.4em;
        }

        .topbar-nav {
            display: flex;
            gap: 6px;
        }

        .topbar-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
        }

        .topbar-nav a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.06);
        }

        .topbar-nav a.active {
            color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            transition: background 0.3s;
        }

        .ws-dot.connected {
            background: var(--accent-emerald);
        }

        /* Main layout */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h3 {
            font-size: 0.95em;
            font-weight: 700;
        }

        .sidebar-section {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section h4 {
            font-size: 0.8em;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        /* Drone list */
        .drone-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: background 0.2s;
            cursor: pointer;
        }

        .drone-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .drone-icon {
            font-size: 1.3em;
        }

        .drone-info {
            flex: 1;
        }

        .drone-name {
            font-size: 0.85em;
            font-weight: 600;
        }

        .drone-meta {
            font-size: 0.72em;
            color: var(--text-secondary);
        }

        .drone-status {
            font-size: 0.7em;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .drone-status.idle {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-emerald);
        }

        .drone-status.responding {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
        }

        /* Incident list */
        .incident-item {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .incident-item:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.05);
        }

        .incident-item .inc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .incident-item .inc-id {
            font-size: 0.78em;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .incident-item .inc-type {
            font-size: 0.82em;
            font-weight: 600;
        }

        .incident-item .inc-detail {
            font-size: 0.72em;
            color: var(--text-secondary);
        }

        .priority-badge {
            font-size: 0.68em;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 8px;
        }

        .priority-CRITICAL {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
        }

        .priority-HIGH {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-amber);
        }

        .priority-MEDIUM {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-blue);
        }

        /* Map Container */
        #map {
            flex: 1;
            min-height: 0;
        }

        /* Buttons */
        .btn-sm {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.78em;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-demo {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            color: white;
        }

        .btn-demo:hover {
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        /* User location info */
        .user-location-bar {
            padding: 10px 16px;
            background: rgba(59, 130, 246, 0.08);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.78em;
        }
        .user-location-bar .loc-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent-blue);
            box-shadow: 0 0 8px var(--accent-blue);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { box-shadow: 0 0 4px var(--accent-blue); }
            50% { box-shadow: 0 0 16px var(--accent-blue); }
        }
        .user-location-bar .coords {
            color: var(--text-secondary);
            flex: 1;
        }

        /* Report incident button */
        .btn-report {
            background: linear-gradient(135deg, var(--accent-red), #dc2626);
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 0.82em;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-report:hover { box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); transform: translateY(-1px); }
        .btn-report:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }

        /* Camera modal overlay */
        .camera-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        .camera-modal.active { display: flex; }
        .camera-modal h3 { color: white; font-size: 1.1em; }
        .camera-modal video, .camera-modal canvas {
            max-width: 640px;
            width: 90%;
            border-radius: 12px;
            border: 2px solid var(--accent-blue);
        }
        .camera-modal canvas { display: none; }
        .camera-modal .cam-buttons {
            display: flex; gap: 12px;
        }
        .camera-modal .cam-btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            transition: all 0.2s;
        }
        .cam-btn-capture { background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); color: white; }
        .cam-btn-send { background: linear-gradient(135deg, var(--accent-emerald), #059669); color: white; display: none; }
        .cam-btn-cancel { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2) !important; }
        .cam-btn-capture:hover, .cam-btn-send:hover { transform: translateY(-2px); }
        .camera-modal .cam-status { color: var(--text-secondary); font-size: 0.85em; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-height: 40vh;
            }

            .main-layout {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-brand"><span></span> DroneRescue AI</div>
        <div class="topbar-nav">
            <a href="index.html">Home</a>
            <a href="map.html" class="active">Live Map</a>
           
        </div>
        <div class="ws-status">
            <div class="ws-dot" id="wsDot"></div>
            <span id="wsLabel">Connecting...</span>
        </div>
    </div>

    <!-- Camera Capture Modal -->
    <div class="camera-modal" id="cameraModal">
        <h3 id="cameraTitle">📷 Drone Camera — Capture Scene</h3>
        <video id="cameraVideo" autoplay playsinline></video>
        <canvas id="cameraCanvas"></canvas>
        <div class="cam-status" id="cameraStatus">Initializing camera...</div>
        <div class="cam-buttons">
            <button class="cam-btn cam-btn-capture" id="btnCapture" onclick="capturePhoto()"> Capture</button>
            <button class="cam-btn cam-btn-send" id="btnSend" onclick="sendCapturedPhoto()"> Send to Dashboard</button>
            <button class="cam-btn cam-btn-cancel" onclick="closeCameraModal()">✕ Close</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>Mission Control</h3>
                <button class="btn-sm btn-danger" onclick="clearAllIncidents()"
                    title="Clear all incidents and reset drones"> Clear All</button>
            </div>

            <!-- User Location -->
            <div class="user-location-bar" id="userLocationBar">
                <div class="loc-dot"></div>
                <span>📍 Your Location:</span>
                <span class="coords" id="userCoords">Detecting...</span>
            </div>

            <div class="sidebar-section">
                <h4> Drone Fleet</h4>
                <div id="droneList">
                    <div class="empty-state">Loading drones...</div>
                </div>
            </div>

            <div class="sidebar-section">
                <h4> Report Incident</h4>
                <button class="btn-report" id="btnReportIncident" onclick="reportIncidentFromCamera()" disabled>
                     Report Incident at My Location
                </button>
                <div style="font-size:0.72em; color:var(--text-secondary); margin-top:6px; text-align:center;" id="reportHelp">
                    Waiting for your location...
                </div>
            </div>

            <div class="sidebar-section">
                <h4> Active Incidents</h4>
                <div id="incidentList">
                    <div class="empty-state">No incidents</div>
                </div>
            </div>
        </div>

        <!-- Mappls Map -->
        <div id="map"></div>
    </div>

    <!-- Mappls (MapMyIndia) SDK -->
    <script
        src="https://apis.mappls.com/advancedmaps/api/fff136fd87e7c3ac3bdb9ecaeeed14bb/map_sdk?layer=vector&v=3.0"></script>
    <script src="script.js"></script>
    <script>
        // ---------------------------------------------------------------
        // State
        // ---------------------------------------------------------------
        let mapplsMap = null;
        let droneMarkers = {};
        let incidentMarkers = {};
        let userMarker = null;
        let routePolylines = {};
        let routePoints = {};
        let radiusCircles = {};
        let mapReady = false;
        // Default / fallback location — North Bangalore, India
        const DEFAULT_LAT = 13.114751;
        const DEFAULT_LON = 77.634742;
        let userLat = DEFAULT_LAT, userLon = DEFAULT_LON;
        let usingDefaultLocation = true; // true until real GPS acquired
        let cameraStream = null;
        let capturedBlob = null;
        let cameraIncidentId = null; // which incident the camera is capturing for

        // ---------------------------------------------------------------
        // Mappls Map Initialization
        // ---------------------------------------------------------------
        const mapObj = new mappls.Map("map", {
            center: [13.114751, 77.634742],
            zoom: 15,
            zoomControl: true,
            search: false,
        });

        mapObj.addListener("load", function () {
            mapplsMap = mapObj;
            mapReady = true;
            console.log("Mappls map loaded successfully");
            loadDrones();
            loadIncidents();
            getUserLocation();
        });

        // ---------------------------------------------------------------
        // User Geolocation
        // ---------------------------------------------------------------
        function getUserLocation() {
            // Immediately show default location and enable reporting
            document.getElementById("userCoords").textContent =
                `${userLat.toFixed(5)}, ${userLon.toFixed(5)}` + (usingDefaultLocation ? " (default)" : "");
            document.getElementById("btnReportIncident").disabled = false;
            document.getElementById("reportHelp").textContent =
                "Opens your camera to capture the scene & dispatch a drone";

            // Place user marker at default position immediately
            if (mapReady) {
                placeUserMarker(userLat, userLon);
            }

            if (!navigator.geolocation) {
                console.warn("Geolocation not supported, using default location");
                return;
            }

            // Get position once and lock it (no continuous tracking)
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const accuracy = pos.coords.accuracy;

                    if (accuracy < 500) {
                        userLat = lat;
                        userLon = lon;
                        usingDefaultLocation = false;
                        document.getElementById("userCoords").textContent =
                            `${userLat.toFixed(5)}, ${userLon.toFixed(5)} (GPS)`;
                    } else {
                        console.warn(`Geolocation accuracy too low (${accuracy.toFixed(0)}m), keeping default location`);
                        document.getElementById("userCoords").textContent =
                            `${userLat.toFixed(5)}, ${userLon.toFixed(5)} (default)`;
                    }

                    if (mapReady) {
                        placeUserMarker(userLat, userLon);
                        mapplsMap.setCenter({ lat: userLat, lng: userLon });
                        mapplsMap.setZoom(14);
                    }
                },
                (err) => {
                    console.warn("Geolocation error:", err.message, "— using default location");
                    document.getElementById("userCoords").textContent =
                        `${userLat.toFixed(5)}, ${userLon.toFixed(5)} (default)`;
                    if (mapReady && !userMarker) {
                        placeUserMarker(userLat, userLon);
                        mapplsMap.setCenter({ lat: userLat, lng: userLon });
                        mapplsMap.setZoom(14);
                    }
                },
                { enableHighAccuracy: true, maximumAge: 60000, timeout: 10000 }
            );
        }

        // Helper — place or update the "YOU" marker
        function placeUserMarker(lat, lon) {
            if (userMarker) {
                try { userMarker.remove(); } catch(e){}
                userMarker = null;
            }
            const userHTML = '<div style="position:relative;width:48px;height:56px;">' +
                '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="56" viewBox="0 0 48 56">' +
                '<circle cx="24" cy="24" r="22" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="3"/>' +
                '<circle cx="24" cy="24" r="14" fill="#3b82f6" fill-opacity="0.25"/>' +
                '<circle cx="24" cy="18" r="5" fill="white"/>' +
                '<path d="M15 33 Q15 26 24 26 Q33 26 33 33 L33 35 Q33 37 31 37 L17 37 Q15 37 15 35 Z" fill="white"/>' +
                '<rect x="6" y="46" width="36" height="10" rx="5" fill="#2563eb"/>' +
                '<text x="24" y="54" text-anchor="middle" font-size="8" font-weight="800" fill="white" font-family="sans-serif">YOU</text>' +
                '</svg></div>';
            userMarker = new mappls.Marker({
                map: mapplsMap,
                position: { lat: lat, lng: lon },
                fitbounds: false,
                html: userHTML,
                width: 48,
                height: 56,
                offset: [0, 0],
            });
            console.log(" User marker at", lat, lon, usingDefaultLocation ? "(default)" : "(GPS)");
        }

        // ---------------------------------------------------------------
        // Markers
        // ---------------------------------------------------------------
        // SVG icon builders — simple shapes only (no defs/filter/animate for Mappls compatibility)
        function droneSVG(color, label) {
            return '<svg xmlns="http://www.w3.org/2000/svg" width="52" height="58" viewBox="0 0 52 58">' +
                '<circle cx="26" cy="26" r="24" fill="' + color + '" fill-opacity="0.15" stroke="' + color + '" stroke-width="2"/>' +
                '<rect x="20" y="20" width="12" height="12" rx="3" fill="' + color + '"/>' +
                '<line x1="20" y1="26" x2="8" y2="14" stroke="' + color + '" stroke-width="2.5"/>' +
                '<line x1="32" y1="26" x2="44" y2="14" stroke="' + color + '" stroke-width="2.5"/>' +
                '<line x1="20" y1="26" x2="8" y2="38" stroke="' + color + '" stroke-width="2.5"/>' +
                '<line x1="32" y1="26" x2="44" y2="38" stroke="' + color + '" stroke-width="2.5"/>' +
                '<circle cx="8" cy="14" r="5" fill="' + color + '" fill-opacity="0.6"/>' +
                '<circle cx="44" cy="14" r="5" fill="' + color + '" fill-opacity="0.6"/>' +
                '<circle cx="8" cy="38" r="5" fill="' + color + '" fill-opacity="0.6"/>' +
                '<circle cx="44" cy="38" r="5" fill="' + color + '" fill-opacity="0.6"/>' +
                '<circle cx="8" cy="14" r="2" fill="white"/>' +
                '<circle cx="44" cy="14" r="2" fill="white"/>' +
                '<circle cx="8" cy="38" r="2" fill="white"/>' +
                '<circle cx="44" cy="38" r="2" fill="white"/>' +
                '<circle cx="26" cy="26" r="3" fill="white"/>' +
                '<rect x="7" y="46" width="38" height="11" rx="5" fill="' + color + '"/>' +
                '<text x="26" y="54" text-anchor="middle" font-size="8" font-weight="700" fill="white" font-family="sans-serif">' + (label||'') + '</text>' +
                '</svg>';
        }

        function movingDroneSVG(pct) {
            return '<svg xmlns="http://www.w3.org/2000/svg" width="60" height="68" viewBox="0 0 60 68">' +
                '<circle cx="30" cy="30" r="28" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="3"/>' +
                '<circle cx="30" cy="30" r="20" fill="#f59e0b" fill-opacity="0.1"/>' +
                '<rect x="24" y="24" width="12" height="12" rx="3" fill="#f59e0b"/>' +
                '<line x1="24" y1="30" x2="10" y2="16" stroke="#f59e0b" stroke-width="3"/>' +
                '<line x1="36" y1="30" x2="50" y2="16" stroke="#f59e0b" stroke-width="3"/>' +
                '<line x1="24" y1="30" x2="10" y2="44" stroke="#f59e0b" stroke-width="3"/>' +
                '<line x1="36" y1="30" x2="50" y2="44" stroke="#f59e0b" stroke-width="3"/>' +
                '<circle cx="10" cy="16" r="6" fill="#fbbf24" fill-opacity="0.8"/>' +
                '<circle cx="50" cy="16" r="6" fill="#fbbf24" fill-opacity="0.8"/>' +
                '<circle cx="10" cy="44" r="6" fill="#fbbf24" fill-opacity="0.8"/>' +
                '<circle cx="50" cy="44" r="6" fill="#fbbf24" fill-opacity="0.8"/>' +
                '<circle cx="10" cy="16" r="2.5" fill="white"/>' +
                '<circle cx="50" cy="16" r="2.5" fill="white"/>' +
                '<circle cx="10" cy="44" r="2.5" fill="white"/>' +
                '<circle cx="50" cy="44" r="2.5" fill="white"/>' +
                '<circle cx="30" cy="30" r="3.5" fill="white"/>' +
                '<rect x="10" y="55" width="40" height="12" rx="6" fill="#f59e0b"/>' +
                '<text x="30" y="64" text-anchor="middle" font-size="9" font-weight="800" fill="white" font-family="sans-serif">' + Math.round(pct) + '%</text>' +
                '</svg>';
        }

        function createDroneMarker(drone) {
            if (!mapReady) return;
            if (droneMarkers[drone.id]) { try { droneMarkers[drone.id].remove(); } catch(e){} }

            const color = drone.status === 'responding' ? '#f59e0b' : '#10b981';
            const label = drone.name.split(' ')[0];
            const droneHTML = '<div style="position:relative;width:52px;height:58px;">' +
                droneSVG(color, label) + '</div>';
            var marker = new mappls.Marker({
                map: mapplsMap,
                position: { lat: drone.latitude, lng: drone.longitude },
                fitbounds: false,
                html: droneHTML,
                width: 52, height: 58,
                offset: [0, 0],
                popupOptions: { openPopup: false },
            });
            droneMarkers[drone.id] = marker;
            console.log(" Drone marker created:", drone.id, "at", drone.latitude, drone.longitude);
            return marker;
        }

        function incidentSVG(type) {
            return '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="50" viewBox="0 0 36 50">' +
                '<ellipse cx="18" cy="46" rx="8" ry="3" fill="black" fill-opacity="0.2"/>' +
                '<path d="M18 46 L5 26 A16 16 0 1 1 31 26 Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>' +
                '<circle cx="18" cy="16" r="7" fill="white"/>' +
                '<text x="18" y="19" text-anchor="middle" font-size="8" font-weight="800" fill="#ef4444" font-family="sans-serif">SOS</text>' +
                '</svg>';
        }

        function createIncidentMarker(inc) {
            if (!mapReady) return;
            if (incidentMarkers[inc.incident_id]) return;

            const incHTML = '<div style="position:relative;width:36px;height:50px;">' +
                incidentSVG(inc.incident_type) + '</div>';
            var marker = new mappls.Marker({
                map: mapplsMap,
                position: { lat: inc.latitude, lng: inc.longitude },
                fitbounds: false,
                html: incHTML,
                width: 36, height: 50,
                offset: [0, 0],
                popupOptions: { openPopup: false },
            });
            incidentMarkers[inc.incident_id] = marker;
            console.log(" Incident marker created:", inc.incident_id, "at", inc.latitude, inc.longitude);
            drawRadiusCircle(inc.incident_id, inc.latitude, inc.longitude);
            return marker;
        }

        function updateDronePosition(droneId, lat, lng, progressPct) {
            if (!mapReady) return;
            // Remove old marker and recreate at new position (Mappls setPosition can be unreliable)
            if (droneMarkers[droneId]) {
                try { droneMarkers[droneId].remove(); } catch(e){}
            }
            const movHTML = '<div style="position:relative;width:60px;height:68px;">' +
                movingDroneSVG(progressPct || 0) + '</div>';
            var marker = new mappls.Marker({
                map: mapplsMap,
                position: { lat: lat, lng: lng },
                fitbounds: false,
                html: movHTML,
                width: 60, height: 68,
                offset: [0, 0],
            });
            droneMarkers[droneId] = marker;
        }

        function drawRouteSegment(incidentId, lat, lng) {
            if (!mapReady) return;
            if (!routePoints[incidentId]) routePoints[incidentId] = [];
            routePoints[incidentId].push({ lat: lat, lng: lng });
            if (routePolylines[incidentId]) routePolylines[incidentId].remove();
            if (routePoints[incidentId].length >= 2) {
                routePolylines[incidentId] = new mappls.Polyline({
                    map: mapplsMap,
                    path: routePoints[incidentId],
                    strokeColor: "#f59e0b",
                    strokeOpacity: 0.85,
                    strokeWeight: 4,
                    fitbounds: false,
                });
            }
        }

        // ---------------------------------------------------------------
        // 2km Radius circle around incident
        // ---------------------------------------------------------------
        function drawRadiusCircle(incidentId, lat, lng) {
            if (!mapReady) return;
            if (radiusCircles[incidentId]) {
                try { radiusCircles[incidentId].remove(); } catch(e){}
            }
            try {
                radiusCircles[incidentId] = new mappls.Circle({
                    map: mapplsMap,
                    center: { lat: lat, lng: lng },
                    radius: 2000,
                    strokeColor: '#ef4444',
                    strokeOpacity: 0.5,
                    strokeWeight: 2,
                    fillColor: '#ef4444',
                    fillOpacity: 0.08,
                });
            } catch(e) {
                console.warn("Circle overlay not supported, skipping");
            }
        }

        // ---------------------------------------------------------------
        // Auto-capture & send when drone arrives
        // ---------------------------------------------------------------
        function autoCaptureAndSend() {
            const status = document.getElementById("cameraStatus");
            let countdown = 3;
            status.textContent = `📸 Auto-capturing in ${countdown}s...`;
            const timer = setInterval(() => {
                countdown--;
                if (countdown <= 0) {
                    clearInterval(timer);
                    if (!document.getElementById("cameraModal").classList.contains("active")) return;
                    capturePhoto();
                    status.textContent = " Sending to dashboard...";
                    setTimeout(() => {
                        if (capturedBlob) sendCapturedPhoto();
                    }, 800);
                } else {
                    status.textContent = `Auto-capturing in ${countdown}s...`;
                }
            }, 1000);
        }

        // ---------------------------------------------------------------
        // Load drones and incidents
        // ---------------------------------------------------------------
        async function loadDrones() {
            try {
                const drones = await getDrones();
                const container = document.getElementById("droneList");
                container.innerHTML = "";
                drones.forEach(drone => {
                    const div = document.createElement("div");
                    div.className = "drone-item";
                    // Calculate distance from user if available
                    let distText = "";
                    if (userLat !== null) {
                        const d = haversineJS(userLat, userLon, drone.latitude, drone.longitude);
                        distText = ` · ${d.toFixed(1)} km away`;
                    }
                    div.innerHTML = `
                        <div class="drone-icon"></div>
                        <div class="drone-info">
                            <div class="drone-name">${drone.name}</div>
                            <div class="drone-meta">🔋 ${drone.battery}%${distText} · ${drone.id}</div>
                        </div>
                        <span class="drone-status ${drone.status}" id="drone-status-${drone.id}">${drone.status}</span>
                    `;
                    div.onclick = () => {
                        if (mapReady) mapplsMap.setCenter({ lat: drone.latitude, lng: drone.longitude });
                        if (mapReady) mapplsMap.setZoom(14);
                    };
                    container.appendChild(div);
                    createDroneMarker(drone);
                });
            } catch (err) {
                console.error("Failed to load drones:", err);
            }
        }

        // Haversine in JS for distance display
        function haversineJS(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function loadIncidents() {
            try {
                const incidents = await getIncidents();
                const container = document.getElementById("incidentList");
                if (incidents.length === 0) {
                    container.innerHTML = '<div class="empty-state">No incidents reported yet.<br>Use the button above to report one!</div>';
                    return;
                }
                container.innerHTML = "";
                incidents.forEach(inc => {
                    const div = document.createElement("div");
                    div.className = "incident-item";
                    div.innerHTML = `
                        <div class="inc-header">
                            <span class="inc-id">${inc.incident_id}</span>
                            <span class="priority-badge priority-${inc.priority}">${inc.priority}</span>
                        </div>
                        <div class="inc-type">${inc.incident_type}</div>
                        <div class="inc-detail">
                            📍 ${inc.latitude.toFixed(4)}, ${inc.longitude.toFixed(4)}
                            ${inc.drone_assigned ? ` ·  ${inc.drone_assigned.drone_name}` : ""}
                        </div>
                    `;
                    div.onclick = () => {
                        if (mapReady) mapplsMap.setCenter({ lat: inc.latitude, lng: inc.longitude });
                        if (mapReady) mapplsMap.setZoom(15);
                    };
                    container.appendChild(div);
                    createIncidentMarker(inc);
                });
            } catch (err) {
                console.error("Failed to load incidents:", err);
            }
        }

        // ---------------------------------------------------------------
        // Report Incident — capture from laptop camera
        // ---------------------------------------------------------------
        async function reportIncidentFromCamera() {
            if (userLat === null) {
                showToast("Location not available yet", "error");
                return;
            }
            cameraIncidentId = null; // this is a NEW incident, not a drone follow-up
            document.getElementById("cameraTitle").textContent = "📷 Capture Incident Scene";
            await openCameraModal("report");
        }

        // ---------------------------------------------------------------
        // Camera Modal
        // ---------------------------------------------------------------
        let cameraMode = "report"; // "report" = new incident, "drone" = drone arrived capture

        async function openCameraModal(mode) {
            cameraMode = mode;
            capturedBlob = null;
            const modal = document.getElementById("cameraModal");
            const video = document.getElementById("cameraVideo");
            const canvas = document.getElementById("cameraCanvas");
            const btnCapture = document.getElementById("btnCapture");
            const btnSend = document.getElementById("btnSend");
            const status = document.getElementById("cameraStatus");

            video.style.display = "block";
            canvas.style.display = "none";
            btnCapture.style.display = "inline-flex";
            btnSend.style.display = "none";
            status.textContent = "Initializing camera...";
            modal.classList.add("active");

            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                });
                video.srcObject = cameraStream;
                status.textContent = mode === "report"
                    ? " Point at the incident and capture"
                    : " Drone camera — capture the scene";
            } catch (err) {
                console.error("Camera error:", err);
                status.textContent = " Camera not available: " + err.message;
            }
        }

        function capturePhoto() {
            const video = document.getElementById("cameraVideo");
            const canvas = document.getElementById("cameraCanvas");
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);

            video.style.display = "none";
            canvas.style.display = "block";
            document.getElementById("btnCapture").style.display = "none";
            document.getElementById("btnSend").style.display = "inline-flex";
            document.getElementById("cameraStatus").textContent = " Photo captured! Click Send to upload.";

            canvas.toBlob((blob) => { capturedBlob = blob; }, "image/jpeg", 0.85);
        }

        async function sendCapturedPhoto() {
            if (!capturedBlob) { showToast("No photo captured", "error"); return; }
            const status = document.getElementById("cameraStatus");
            const btnSend = document.getElementById("btnSend");
            btnSend.disabled = true;
            status.textContent = " Uploading...";

            try {
                if (cameraMode === "report") {
                    // Create new incident
                    const formData = new FormData();
                    formData.append("latitude", userLat);
                    formData.append("longitude", userLon);
                    formData.append("image", capturedBlob, "incident.jpg");

                    const resp = await fetch(`${API_BASE_URL}/incident`, { method: "POST", body: formData });
                    if (resp.ok) {
                        const result = await resp.json();
                        showToast(`Incident ${result.incident.incident_id} created! Drone dispatched.`, "success");
                        loadIncidents();
                        loadDrones();
                    } else {
                        showToast(" Failed to create incident", "error");
                    }
                } else if (cameraMode === "drone" && cameraIncidentId) {
                    // Upload drone camera image to existing incident
                    const formData = new FormData();
                    formData.append("image", capturedBlob, "drone_capture.jpg");

                    const resp = await fetch(`${API_BASE_URL}/upload-image/${cameraIncidentId}`, {
                        method: "POST", body: formData
                    });
                    if (resp.ok) {
                        showToast(` Drone image uploaded for ${cameraIncidentId}`, "success");
                    } else {
                        showToast(" Failed to upload image", "error");
                    }
                }
                closeCameraModal();
            } catch (err) {
                status.textContent = " Upload failed: " + err.message;
                btnSend.disabled = false;
            }
        }

        function closeCameraModal() {
            document.getElementById("cameraModal").classList.remove("active");
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            capturedBlob = null;
        }

        // ---------------------------------------------------------------
        // WebSocket — live drone updates
        // ---------------------------------------------------------------
        const ws = new DroneWebSocket((data) => {
            const wsDot = document.getElementById("wsDot");
            const wsLabel = document.getElementById("wsLabel");
            wsDot.classList.add("connected");
            wsLabel.textContent = "Live";

            switch (data.type) {
                case "drone_position":
                    console.log(` Drone ${data.drone_id} moving: step ${data.step}/${data.total_steps} (${data.progress_pct}%) → [${data.latitude}, ${data.longitude}]`);
                    updateDronePosition(data.drone_id, data.latitude, data.longitude, data.progress_pct);
                    drawRouteSegment(data.incident_id, data.latitude, data.longitude);
                    // Update sidebar status
                    const statusEl = document.getElementById(`drone-status-${data.drone_id}`);
                    if (statusEl) {
                        statusEl.textContent = `${data.progress_pct}%`;
                        statusEl.className = "drone-status responding";
                    }
                    break;

                case "drone_departed":
                    showToast(`🚁 ${data.drone_name} dispatched to ${data.incident_id}`, "info");
                    // Create the moving drone marker at start position
                    updateDronePosition(data.drone_id, data.start.lat, data.start.lon, 0);
                    // Add route start point
                    drawRouteSegment(data.incident_id, data.start.lat, data.start.lon);
                    if (!incidentMarkers[data.incident_id]) {
                        createIncidentMarker({
                            incident_id: data.incident_id,
                            latitude: data.target.lat,
                            longitude: data.target.lon,
                        });
                    }
                    if (mapReady) {
                        mapplsMap.fitBounds([
                            { lat: data.start.lat, lng: data.start.lon },
                            { lat: data.target.lat, lng: data.target.lon },
                        ], { padding: 80, maxZoom: 14 });
                    }
                    loadDrones();
                    break;

                case "drone_arrived":
                    showToast(` ${data.drone_name} arrived at incident!`, "success");
                    loadDrones();
                    break;

                case "capture_camera":
                    // Drone arrived — auto-open camera, capture & send to dashboard
                    showToast(`📷 Drone ${data.drone_id} arrived! Auto-capturing scene...`, "info");
                    cameraIncidentId = data.incident_id;
                    document.getElementById("cameraTitle").textContent =
                        `📷 Drone Camera — ${data.drone_id} at ${data.incident_id}`;
                    openCameraModal("drone").then(() => {
                        autoCaptureAndSend();
                    });
                    break;

                case "new_incident":
                    showToast(`New incident: ${data.incident.incident_type}`, "warning");
                    loadIncidents();
                    break;

                case "drone_image_uploaded":
                    showToast(`📷 Drone image sent to dashboard for ${data.incident_id}`, "info");
                    break;

                case "fleet_repositioned":
                    console.log("📍 Fleet repositioned near incident");
                    if (data.drones) {
                        const nearbyCount = data.drones.filter(d => d.status === 'idle').length;
                        showToast(`📍 ${nearbyCount} drones positioned within 2km of incident`, "info");
                    }
                    if (data.incident_lat && data.incident_lon && mapReady) {
                        mapplsMap.setCenter({ lat: data.incident_lat, lng: data.incident_lon });
                        mapplsMap.setZoom(14);
                    }
                    loadDrones();
                    break;

                case "system_reset":
                    showToast("♻️ System reset: All incidents cleared", "warning");
                    // Clear all map markers
                    Object.values(droneMarkers).forEach(m => { try { m.remove(); } catch(e){} });
                    Object.values(incidentMarkers).forEach(m => { try { m.remove(); } catch(e){} });
                    Object.values(routePolylines).forEach(p => { try { p.remove(); } catch(e){} });
                    Object.values(radiusCircles).forEach(c => { try { c.remove(); } catch(e){} });
                    droneMarkers = {};
                    incidentMarkers = {};
                    routePolylines = {};
                    routePoints = {};
                    radiusCircles = {};
                    loadDrones();
                    loadIncidents();
                    break;
            }
        });

        // Mark WS connected
        setTimeout(() => {
            if (ws.ws && ws.ws.readyState === WebSocket.OPEN) {
                document.getElementById("wsDot").classList.add("connected");
                document.getElementById("wsLabel").textContent = "Live";
            }
        }, 2500);

        // ---------------------------------------------------------------
        // Clear all incidents
        // ---------------------------------------------------------------
        async function clearAllIncidents() {
            if (!confirm("Clear ALL incidents and reset ALL drones?")) return;
            try {
                const resp = await fetch(`${API_BASE_URL}/incidents`, { method: 'DELETE' });
                if (resp.ok) showToast("System reset", "success");
                else showToast(" Reset failed", "error");
            } catch (err) {
                showToast(" Connection error", "error");
            }
        }

        setInterval(loadIncidents, 15000);
    </script>
</body>

</html>
